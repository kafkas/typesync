# yaml-language-server: $schema=../../../../schema.local.json
#
# Shared integration-test fixture. Consumed by every per-platform integration
# suite under tests/integration/<platform>/. The schema deliberately mixes a
# string enum alias and a single document model with a string, an enum and a
# timestamp so we exercise the most common type plumbing across generators.

UserRole:
  model: alias
  docs: Represents a user's role within a project.
  type:
    type: enum
    members:
      - label: Owner
        value: owner
      - label: Admin
        value: admin
      - label: Member
        value: member

User:
  model: document
  path: users/{userId}
  docs: Represents a user that belongs to a project.
  type:
    type: object
    fields:
      username:
        type: string
        docs: A string that uniquely identifies the user within a project.
      role:
        type: UserRole
      created_at:
        type: timestamp
